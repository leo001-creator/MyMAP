<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Žemėlapis su vietomis</title>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  #map {
    width: 250%; /* padidinome 2,5 karto */
    height: 600px;
  }
  #places-list {
    margin-top: 20px;
  }
</style>
</head>
<body>

<h2>Žemėlapis su vietomis</h2>

<div id="map"></div>

<h3>Pridėti vietą</h3>
<label>Koordinatės (viena eilutė):</label><br/>
<input type="text" id="coords" value='54°42\'17.9"N 25°16\'52.4"E' style="width: 400px;"/><br/><br/>
<label>Pavadinimas:</label><br/>
<input type="text" id="placeName" value="Nauja vieta" style="width: 200px;"/><br/><br/>
<button onclick="addCurrentCoordinates()">Pridėti dabartines koordinates</button>

<h3>Vietų sąrašas</h3>
<div id="places-list"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // inicializuojame žemėlapį
  const map = L.map('map').setView([54.7050, 25.2801], 10);
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // vietų sąrašas
  let places = [];

  // funkcija pridėti vietą
  function addPlace(lat, lng, name) {
    const id = Date.now(); // unikalus ID
    // pridedame į sąrašą
    places.push({id, lat, lng, name});
    updatePlacesList();

    // pridedame žymę žemėlapyje
    const marker = L.marker([lat, lng]).addTo(map).bindPopup(name);
    marker._id = id; // priskiriame ID žymei
  }

  // atnaujinti sąrašą
  function updatePlacesList() {
    const listDiv = document.getElementById("places-list");
    listDiv.innerHTML = "";
    places.forEach(place => {
      const div = document.createElement("div");
      div.innerHTML = `
        <b>${place.name}</b> (${formatCoordinates(place.lat, place.lng)})
        <button onclick="removePlace(${place.id})">Ištrinti</button>
      `;
      listDiv.appendChild(div);
    });
  }

  // funkcija ištrinti vietą
  function removePlace(id) {
    // ištrinti iš sąrašo
    places = places.filter(p => p.id !== id);
    // ištrinti žymę iš žemėlapio
    map.eachLayer(layer => {
      if (layer._id === id) {
        map.removeLayer(layer);
      }
    });
    updatePlacesList();
  }

  // formatavimas koordinačių kaip viena eilutė
  function formatCoordinates(lat, lng) {
    return `"${convertToDMS(lat, true)} ${convertToDMS(lng, false)}"`;
  }

  function convertToDMS(deg, isLat) {
    const absolute = Math.abs(deg);
    const degrees = Math.floor(absolute);
    const minutesNotTruncated = (absolute - degrees) * 60;
    const minutes = Math.floor(minutesNotTruncated);
    const seconds = ((minutesNotTruncated - minutes) * 60).toFixed(1);

    const direction = getDirection(deg, isLat);
    return `${degrees}°${minutes}'${seconds}"${direction}`;
  }

  function getDirection(deg, isLat) {
    if (isLat) {
      return deg >= 0 ? 'N' : 'S';
    } else {
      return deg >= 0 ? 'E' : 'W';
    }
  }

  // funkcija pridėti dabartines koordinates iš įvesties
  function addCurrentCoordinates() {
    const coordsStr = document.getElementById("coords").value;
    const name = document.getElementById("placeName").value.trim() || "Vieta";

    const coords = parseCoordinates(coordsStr);
    if (coords) {
      addPlace(coords.lat, coords.lng, name);
    } else {
      alert("Neleistinos koordinatės");
    }
  }

  // paprastas koordinatų parsinimas (labai bazinis)
  function parseCoordinates(str) {
    // Pavyzdžiui: "54°42'17.9\"N 25°16'52.4\"E"
    const regex = /(\d+)°(\d+)'([\d.]+)\"([NS])\s+(\d+)°(\d+)'([\d.]+)\"([EW])/i;
    const match = str.match(regex);
    if (match) {
      const latDeg = parseInt(match[1]);
      const latMin = parseInt(match[2]);
      const latSec = parseFloat(match[3]);
      const latDir = match[4];

      const lngDeg = parseInt(match[5]);
      const lngMin = parseInt(match[6]);
      const lngSec = parseFloat(match[7]);
      const lngDir = match[8];

      let lat = latDeg + latMin/60 + latSec/3600;
      let lng = lngDeg + lngMin/60 + lngSec/3600;

      if (latDir.toUpperCase() === 'S') lat = -lat;
      if (lngDir.toUpperCase() === 'W') lng = -lng;

      return {lat, lng};
    } else {
      return null;
    }
  }

  // pradinės vietos (galite pridėti savo)
  addPlace(54.7050, 25.2801, "Pirmoji vieta");
</script>

</body>
</html>
